services:
  inbox-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: inbox-bridge:latest
    container_name: inbox-bridge

    # ── Restart policy ──────────────────────────────────────────
    # "unless-stopped" ensures the container:
    #   • Restarts automatically after a crash
    #   • Restarts when Docker daemon starts (e.g. after reboot)
    #   • Stays stopped ONLY if you explicitly stop it
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1
      - HEALTHCHECK_PORT=8080

    volumes:
      - ./config:/app/config                # rw: OAuth2 tokens need refresh
      - ./data:/app/data
      - ./logs:/app/logs

    # ── Resource limits (prevent runaway memory/CPU) ────────────
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

    # ── Logging ─────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # ── Networking ──────────────────────────────────────────────
    ports:
      - "127.0.0.1:8080:8080"   # health-check (localhost only)
